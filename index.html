<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tiny Page</title>
<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4);
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:#333;
}
.card{
  background:white;
  padding:32px;
  border-radius:18px;
  box-shadow:0 12px 30px rgba(0,0,0,0.15);
  max-width:340px;
}
button{
  margin-top:22px;
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#ff6b81;
  color:white;
  font-size:16px;
  cursor:pointer;
}
button:hover{
  opacity:0.9;
}
#message{
  margin-top:22px;
  font-size:18px;
  display:none;
}

/* added spacing between the revealed message parts */
#message p{
  margin-top:16px;
}
</style>
</head>
<body>

<div class="card">
<h2>Hey 👋</h2>

<p>
I built this tiny page today.<br><br>
It only has one intended visitor - you.<br>
So, don't share it! 🙂
</p>

<button id="tapButton" onclick="showMessage()">Tap me</button>

<div id="message">
<p><strong>Congratulations 🎉</strong></p>

<p>
You just unlocked<br>
"Today's Random Nice Message"
</p>

<p>
I hope this made you smile…<br>
even just a little bit. 🌷
</p>
</div>

</div>

<script>
function showMessage(){
  document.getElementById("message").style.display="block";
  document.getElementById("tapButton").style.display="none";
}
</script>

</body>
</html>
